<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f5f0" rx="8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#8b7355" stroke-width="2" rx="4"/>

  <!-- Brand Name -->
  <text x="400" y="90" text-anchor="middle" font-family="serif" font-size="42" font-weight="bold" fill="#1a1a1a">Mountain Creek</text>

  <!-- Class/Type -->
  <text x="400" y="135" text-anchor="middle" font-family="serif" font-size="22" fill="#444">American Single Malt Whiskey</text>

  <!-- Divider -->
  <line x1="200" y1="160" x2="600" y2="160" stroke="#8b7355" stroke-width="1"/>

  <!-- ABV -->
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">45% ALC./VOL.</text>

  <!-- Net Contents -->
  <text x="400" y="240" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#555">750 mL</text>

  <!-- Producer -->
  <text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#666">Produced by Mountain Creek Distillery, Louisville, KY 40202</text>

  <!-- Government Warning Box -->
  <rect x="60" y="320" width="680" height="220" fill="#fff" stroke="#999" stroke-width="1" rx="2"/>

  <!-- Warning Heading -->
  <text x="400" y="355" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000">Government Warning:</text>

  <!-- Warning Body - split across lines -->
  <text x="80" y="385" font-family="sans-serif" font-size="12" fill="#333">
    <tspan x="80" dy="0">(1) According to the Surgeon General, women should not drink</tspan>
    <tspan x="80" dy="18">alcoholic beverages during pregnancy because of the risk of birth</tspan>
    <tspan x="80" dy="18">defects.</tspan>
    <tspan x="80" dy="24">(2) Consumption of alcoholic beverages impairs your ability to drive</tspan>
    <tspan x="80" dy="18">a car or operate machinery, and may cause health problems.</tspan>
  </text>
</svg>